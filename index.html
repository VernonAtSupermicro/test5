<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>前線突圍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 主畫面 -->
  <section id="title-screen" class="screen active" aria-label="主畫面">
    <div class="title-bg" aria-hidden="true"></div>
    <div class="title-content">
      <p class="brand">前線突圍</p>
      <p class="tagline">堅守陣線，擊退來犯之敵</p>
      <div class="hero-soldier" aria-hidden="true">
        <svg viewBox="0 0 220 280" class="soldier-art" role="img">
          <defs>
            <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6b7a4a"/>
              <stop offset="100%" stop-color="#3d4a2a"/>
            </linearGradient>
            <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#5a6b3d"/>
              <stop offset="100%" stop-color="#2f3a22"/>
            </linearGradient>
          </defs>
          <!-- 身體 -->
          <ellipse cx="110" cy="255" rx="48" ry="10" fill="rgba(0,0,0,0.35)"/>
          <rect x="78" y="140" width="64" height="90" rx="10" fill="url(#bodyGrad)"/>
          <rect x="70" y="145" width="18" height="70" rx="8" fill="#4a5a32"/>
          <rect x="132" y="145" width="18" height="55" rx="8" fill="#4a5a32"/>
          <!-- 槍 -->
          <rect x="148" y="168" width="52" height="10" rx="3" fill="#1a1a1a"/>
          <rect x="195" y="165" width="18" height="6" rx="2" fill="#333"/>
          <rect x="148" y="178" width="12" height="18" rx="2" fill="#222"/>
          <!-- 頭部／頭盔 -->
          <circle cx="110" cy="110" r="36" fill="#c4a882"/>
          <path d="M70 105 Q110 55 150 105 L148 120 Q110 95 72 120 Z" fill="url(#helmetGrad)"/>
          <rect x="68" y="100" width="84" height="14" rx="3" fill="#2a3520"/>
          <rect x="88" y="88" width="44" height="8" rx="2" fill="#2f3a22"/>
          <!-- 面罩陰影 -->
          <ellipse cx="110" cy="118" rx="22" ry="10" fill="rgba(0,0,0,0.25)"/>
          <!-- 眼睛 -->
          <circle cx="98" cy="115" r="3" fill="#1a1a1a"/>
          <circle cx="122" cy="115" r="3" fill="#1a1a1a"/>
        </svg>
      </div>
      <button type="button" id="btn-play" class="btn-play">Play</button>
    </div>
  </section>

  <!-- 遊戲畫面 -->
  <section id="game-screen" class="screen" aria-label="戰場" hidden>
    <header class="hud">
      <div class="hud-item">擊殺 <strong id="kill-count">0</strong> / 20</div>
      <div class="hud-item hint" id="hud-hint">點擊戰場射擊</div>
    </header>
    <div class="game-stage">
      <canvas id="game-canvas" width="800" height="600" aria-label="戰場畫布"></canvas>
    </div>
    <div class="controls">
      <div class="dpad" aria-label="移動控制">
        <button type="button" class="dpad-btn" data-dir="up" aria-label="上">▲</button>
        <div class="dpad-mid">
          <button type="button" class="dpad-btn" data-dir="left" aria-label="左">◀</button>
          <button type="button" class="dpad-btn" data-dir="down" aria-label="下">▼</button>
          <button type="button" class="dpad-btn" data-dir="right" aria-label="右">▶</button>
        </div>
      </div>
      <div class="fire-pad">
        <button type="button" id="btn-fire" class="btn-fire" aria-label="射擊">射擊</button>
        <p class="fire-tip">也可點擊畫面朝該方向開火</p>
      </div>
    </div>
  </section>

  <!-- 過關畫面 -->
  <section id="win-screen" class="screen" aria-label="過關" hidden>
    <div class="overlay-card">
      <h2>任務完成</h2>
      <p>你已擊退 20 名敵人，關卡結束。</p>
      <button type="button" id="btn-again" class="btn-play">再玩一次</button>
      <button type="button" id="btn-home" class="btn-secondary">回主畫面</button>
    </div>
  </section>

  <script src="js/game.js"></script>
</body>
</html>
